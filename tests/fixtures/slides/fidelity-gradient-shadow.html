<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      .slide-canvas {
        position: relative;
        width: 1600px;
        height: 900px;
        background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #22d3ee 100%);
      }
      .fidelity-title {
        position: absolute;
        left: 110px;
        top: 92px;
        width: 820px;
        font-size: 58px;
        line-height: 66px;
        color: #f8fafc;
        font-family: "Avenir Next", Arial, sans-serif;
      }
      .fidelity-panel {
        position: absolute;
        left: 110px;
        top: 250px;
        width: 560px;
        height: 280px;
        background: linear-gradient(160deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.03) 100%);
        border: 2px solid rgba(148, 163, 184, 0.9);
        border-radius: 28px;
        box-shadow: 0px 18px 40px rgba(15, 23, 42, 0.45);
        color: #e2e8f0;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <div class="slide-canvas">
      <h1 class="fidelity-title">Fidelity Import Fixture</h1>
      <div class="fidelity-panel">
        <p>Gradient, border radius, and shadow should survive parse and export.</p>
      </div>
    </div>
  </body>
</html>
